        - generic [ref=e107]:
          - heading "Neutral, open governance" [level=3] [ref=e108]
          - paragraph [ref=e109]: A trusted non-profit holds the project's assets and trademark. Decisions are made transparently by those doing the work.
      - generic [ref=e110]:
        - img [ref=e112]
        - generic [ref=e115]:
          - heading "Sustainable, diverse funding" [level=3] [ref=e116]
          - paragraph [ref=e117]: Tiered memberships and grants de-risk the project — no single funder, no single point of failure.
      - generic [ref=e118]:
        - img [ref=e120]
        - generic [ref=e122]:
          - heading "Future-ready platform" [level=3] [ref=e123]
          - paragraph [ref=e124]: An umbrella structure ready to house new initiatives like an AI Commons — ready for what comes next.
      - generic [ref=e125]:
        - img [ref=e127]
        - generic [ref=e130]:
          - heading "Cost-effective by design" [level=3] [ref=e131]
          - paragraph [ref=e132]: The Linux Foundation shared "Foundation-as-a-Service" model keeps overheads low meaning the majority of funds support coordination of technical projects and the community.
  - generic [ref=e134]:
    - generic [ref=e135]:
      - generic [ref=e136]: Membership
      - heading "Take a seat at the table." [level=2] [ref=e137]
      - paragraph [ref=e138]: Help shape the charter, budget and direction — and build an enduring association with a first-of-its-kind initiative.
    - generic [ref=e139]:
      - paragraph [ref=e140]: Standard tiers · Linux Foundation model
      - generic [ref=e141]:
        - generic [ref=e142]:
          - heading "Premier" [level=3] [ref=e143]
          - paragraph [ref=e144]: $100k / year · 3-year commitment
        - paragraph [ref=e146]: For organizations shaping the foundation. Includes a dedicated Governing Board seat, a hand in the charter, budget and direction, and founding-member brand association. Up-front grants may be accepted in lieu of fees.
      - generic [ref=e147]:
        - generic [ref=e148]:
          - heading "General" [level=3] [ref=e149]
          - paragraph [ref=e150]: Sliding scale, by organization size · incl. $5k/yr Linux Foundation membership
        - paragraph [ref=e152]: The fee scales with organization size — indicatively $10k/year up to 100 employees. General members nominate a board representative (one per five members, up to three total) and take part in working groups and the technical, outreach and other committees.
      - generic [ref=e153]:
        - generic [ref=e154]:
          - heading "Associate" [level=3] [ref=e155]
          - paragraph [ref=e156]: No fee · non-profit, academic & government entities
        - paragraph [ref=e158]: Reserved for approved non-profit, academic and government entities. Associate members may stand for election to the Governing Board (one seat available) and participate fully in working groups and committees.
      - paragraph [ref=e159]: Additional pathways · OHS-SF
      - generic [ref=e160]:
        - generic [ref=e161]:
          - heading "Inclusive" [level=3] [ref=e162]
          - paragraph [ref=e163]: No fee · LMIC for-profits under 100 employees
        - paragraph [ref=e165]: The standard $10k/year General fee is waived to maximize accessibility for entrepreneurs in lower- and middle-income countries, with full participation in working groups.
      - generic [ref=e166]:
        - generic [ref=e167]:
          - heading "Sponsorships or grants" [level=3] [ref=e168]
          - paragraph [ref=e169]: Custom · funders & multilaterals
        - paragraph [ref=e171]: We are open to mission aligned grants or financial sponsorships for specific projects or activities that support the foundations work.
