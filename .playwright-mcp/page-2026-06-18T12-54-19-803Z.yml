  - generic [ref=e21]:
    - generic [ref=e22]: The next chapter
    - heading "An independent, community-owned software foundation." [level=1] [ref=e23]
    - paragraph [ref=e24]: We're transitioning the current Open Health Stack from a Google-led project into an umbrella project at the Linux Foundation — creating a neutral home built to support the global health ecosystem it serves.
  - generic [ref=e27]:
    - generic [ref=e28]: The charter · North star
    - heading "Catalyze sustainable, next-gen digital health solutions." [level=2] [ref=e29]
    - paragraph [ref=e30]: The OHS-SF aims to accelerate "next-gen" digital health aligned with the "Full-STAC remedy" approach — co-authored by the WHO Digital Health Unit and a community of partners — by lowering the cost of innovation and promoting open standards for health.
  - generic [ref=e42]:
    - generic [ref=e43]:
      - generic [ref=e44]: The charter
      - heading "Four commitments, one clear boundary." [level=2] [ref=e45]
      - paragraph [ref=e46]: What the foundation will do — and the one thing it deliberately won't.
    - generic [ref=e47]:
      - generic [ref=e48]:
        - generic [ref=e49]: "01"
        - generic [ref=e50]:
          - heading "Develop & maintain open-source code" [level=3] [ref=e51]
          - paragraph [ref=e52]: Supporting standards based development that promote interoperability (HL7 FHIR) and reusable AI commons libraries and tooling (built on skills, MCP).
      - generic [ref=e53]:
        - generic [ref=e54]: "02"
        - generic [ref=e55]:
          - heading "Enable safe AI adoption" [level=3] [ref=e56]
          - paragraph [ref=e57]: Identifying initiatives like evals and benchmarks to support efforts to develop safe, effective, Verifiable AI (with WHO and partners).
      - generic [ref=e58]:
        - generic [ref=e59]: "03"
        - generic [ref=e60]:
          - heading "Capacity building, advocacy & ecosystem support" [level=3] [ref=e61]
          - paragraph [ref=e62]: Promoting person-centered digital transformation and building capacity through events, workshops and bootcamps.
      - generic [ref=e63]:
        - generic [ref=e64]: "04"
        - generic [ref=e65]:
          - heading "Standards collaboration" [level=3] [ref=e66]
          - paragraph [ref=e67]: Partnering with standards development organizations and other software foundations to proliferate reference architectures and open standards.
    - generic [ref=e68]:
      - img [ref=e70]
      - generic [ref=e73]:
        - heading "The boundary — no \"complete products\"" [level=3] [ref=e74]
        - paragraph [ref=e75]: The foundation will not publish standalone, deployable end-user solutions. It builds the blocks; the community builds the applications.
