name = "ohs-sf-preview"
main = "worker.js"
compatibility_date = "2025-01-01"

# Secrets are NOT stored here — set them via the CLI:
#   wrangler secret put CORRECT_PIN
#   wrangler secret put SESSION_SECRET
#
# To run locally:
#   wrangler dev
#
# To deploy:
#   wrangler deploy
#
# To attach a custom domain (e.g. preview.ohs.foundation):
#   Add a route in the Cloudflare dashboard under Workers > your worker > Triggers
#   or add below:
#
# [[routes]]
# pattern = "preview.ohs.foundation/*"
# zone_name = "ohs.foundation"
